<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教育孩子 · HSK4-5 Flashcards</title>
<style>
  :root{
    --paper: #f3f6f8;
    --grid-line: #cfdce4;
    --ink: #1f2d33;
    --ink-soft: #5f7480;
    --seal-blue: #2a5f7a;
    --seal-blue-soft: #4f87a3;
    --accent: #1f6f8b;
    --card-back-paper: #e9f1f4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    padding:32px 20px 60px;
    background:var(--paper);
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 28px 28px;
    font-family: "Noto Serif TC", "Songti TC", serif;
    color: var(--ink);
    min-height:100vh;
  }
  .header{
    max-width:1000px;
    margin:0 auto 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
  }
  h1{
    font-weight:600;
    font-size:1.4rem;
    letter-spacing:0.15em;
    margin:0;
    color: var(--seal-blue);
  }
  .sub{
    color:var(--ink-soft);
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size:0.8rem;
    letter-spacing:0.02em;
    margin-top:4px;
  }
  .controls{
    display:flex;
    gap:10px;
    align-items:center;
  }
  #shuffleBtn{
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:0.8rem;
    letter-spacing:0.05em;
    background: var(--seal-blue);
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:3px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:7px;
    transition: background 0.2s, transform 0.15s;
  }
  #shuffleBtn:hover{ background: var(--accent); }
  #shuffleBtn:active{ transform: scale(0.96); }
  #shuffleBtn svg{ width:15px; height:15px; }
  .counter{
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:0.75rem;
    color:var(--ink-soft);
  }
  .deck{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap:26px;
    max-width:1000px;
    margin:0 auto;
  }
  .card-slot{
    perspective: 1400px;
    height:360px;
    animation: fadeIn 0.35s ease both;
  }
  @keyframes fadeIn{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .card{
    position:relative;
    width:100%;
    height:100%;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
  }
  .card-slot.flipped .card{
    transform: rotateY(180deg);
  }
  .face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:2px;
    border:1px solid var(--grid-line);
    box-shadow: 0 2px 10px rgba(31,45,51,0.08);
    padding:22px 20px;
    display:flex;
    flex-direction:column;
  }
  .front{
    background:var(--paper);
    align-items:center;
    justify-content:center;
    text-align:center;
  }
  .front .seal{
    position:absolute;
    top:14px; right:14px;
    width:34px; height:34px;
    border:2px solid var(--seal-blue-soft);
    border-radius:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--seal-blue);
    font-size:0.7rem;
    opacity:0.75;
    transform:rotate(2deg);
  }
  .front .idx{
    position:absolute;
    top:16px; left:16px;
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:0.65rem;
    color:var(--ink-soft);
    opacity:0.6;
    letter-spacing:0.05em;
  }
  .hanzi{
    font-size:3.2rem;
    font-weight:600;
    line-height:1.1;
    letter-spacing:0.05em;
  }
  .hanzi .trad{
    font-size:1.05rem;
    color:var(--ink-soft);
    font-weight:400;
    margin-left:10px;
    font-family: "Noto Serif TC", serif;
  }
  .pinyin{
    margin-top:10px;
    color:var(--accent);
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size:1.05rem;
    letter-spacing:0.03em;
  }
  .tap-hint{
    position:absolute;
    bottom:12px; left:0; right:0;
    text-align:center;
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:0.68rem;
    color:var(--ink-soft);
    letter-spacing:0.08em;
    opacity:0.6;
  }
  .back{
    background:var(--card-back-paper);
    transform: rotateY(180deg);
    overflow-y:auto;
    text-align:left;
  }
  .back::-webkit-scrollbar{width:5px;}
  .back::-webkit-scrollbar-thumb{background:var(--grid-line);border-radius:3px;}
  .back .word-tag{
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:0.7rem;
    color:var(--seal-blue);
    letter-spacing:0.1em;
    border-bottom:1px dashed var(--grid-line);
    padding-bottom:6px;
    margin-bottom:10px;
  }
  .section-label{
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:0.62rem;
    letter-spacing:0.12em;
    color:var(--accent);
    text-transform:uppercase;
    margin:10px 0 3px;
  }
  .meaning{
    font-size:1rem;
    font-weight:600;
  }
  .collo-item{
    font-size:0.9rem;
    margin-bottom:2px;
  }
  .collo-item .cp{
    color:var(--ink-soft);
    font-size:0.78rem;
    font-family:"Helvetica Neue", Arial, sans-serif;
  }
  .example-short{
    font-size:0.9rem;
    line-height:1.55;
  }
  .example-short .py-note{
    color:var(--ink-soft);
    font-size:0.72rem;
    font-family:"Helvetica Neue", Arial, sans-serif;
    display:block;
    margin-top:2px;
  }
  .example-vn-short{
    font-size:0.76rem;
    color:var(--ink-soft);
    font-style:italic;
    margin-top:3px;
    font-family:"Helvetica Neue", Arial, sans-serif;

  .example{
    font-size:0.92rem;
    line-height:1.65;
  }
  .example .py-note{
    color:var(--ink-soft);
    font-size:0.75rem;
    font-family:"Helvetica Neue", Arial, sans-serif;

    margin-top:4px;

  .example-vn{
    font-size:0.8rem;
    color:var(--ink-soft);
    font-style:italic;
    margin-top:5px;
    font-family:"Helvetica Neue", Arial, sans-serif;

</style>

let order = CARDS.map((_, i) => i);

function renderDeck(){
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  order.forEach((cardIdx, pos) => {
    const c = CARDS[cardIdx];
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.style.animationDelay = (pos * 0.02) + 's';
    slot.onclick = () => slot.classList.toggle('flipped');

    const colloHtml = c.collo.map(([hz, py, vn]) =>
      `<div class="collo-item">${hz} <span class="cp">${py}</span> — ${vn}</div>`
    ).join('');

    slot.innerHTML = `
      <div class="card">
        <div class="face front">
          <div class="idx">${String(cardIdx+1).padStart(2,'0')}</div>
          <div class="seal">${c.seal}</div>
          <div class="hanzi">${c.simp}<span class="trad">${c.trad}</span></div>
          <div class="pinyin">${c.py}</div>
          <div class="tap-hint">TAP TO FLIP</div>
        </div>
        <div class="face back">
          <div class="word-tag">${c.simp} / ${c.trad} · ${c.py}</div>
          <div class="section-label">Nghĩa</div>
          <div class="meaning">${c.meaning}</div>

          <div class="section-label">Collocation</div>
          ${colloHtml}

          <div class="section-label">Ví dụ ngắn</div>
          <div class="example-short">
            ${c.sHz}
            <span class="py-note">${c.sPy}</span>
          </div>
          <div class="example-vn-short">${c.sVn}</div>

          <div class="section-label">Ví dụ dài</div>
          <div class="example">
            ${c.lHz}
            <span class="py-note">${c.lPy}</span>
          </div>
          <div class="example-vn">${c.lVn}</div>
        </div>
      </div>
    `;
    deck.appendChild(slot);
  });
  document.getElementById('counter').textContent = CARDS.length + ' từ';
}

document.getElementById('shuffleBtn').addEventListener('click', () => {
  for(let i = order.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  renderDeck();
});

renderDeck();
</script>
